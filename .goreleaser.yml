# GoReleaser config for the Mixpanel Terraform provider.
# Produces the cross-compiled zips, SHA256SUMS, and a detached GPG signature
# that the Terraform Registry verifies against the uploaded public key.
# Requires GoReleaser v2.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - "-s -w -X main.version={{.Version}} -X main.commit={{.Commit}}"
    goos:
      - freebsd
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - "386"
      - arm
      - arm64
    ignore:
      - goos: darwin
        goarch: "386"
    binary: "{{ .ProjectName }}_v{{ .Version }}"

archives:
  - formats: ["zip"]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  # The Terraform Registry requires the manifest's checksum to be in SHA256SUMS
  # (and thus covered by the signature), alongside the zips.
  extra_files:
    - glob: "terraform-registry-manifest.json"
      name_template: "{{ .ProjectName }}_{{ .Version }}_manifest.json"
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      # GPG_FINGERPRINT is exported by the import-gpg step in the release workflow.
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  # Upload the registry manifest as a release asset (declares protocol v6;
  # without it the registry assumes protocol 5.0).
  extra_files:
    - glob: "terraform-registry-manifest.json"
      name_template: "{{ .ProjectName }}_{{ .Version }}_manifest.json"
  # The Terraform Registry ingests published (non-draft) releases.
  draft: false
  # Mark -alpha/-beta/-rc tags as GitHub pre-releases automatically.
  prerelease: auto

changelog:
  disable: true
