# HashiCorp tfplugingen-openapi generator config for the Mixpanel provider.
# Generated from gen/refined_manifest.json.
# Input spec: gen/build/openapi.hashicorp.json (produced by gen/preprocess_spec.py)
# Every refined entity -> one resource + one singular data source.
# schema.ignores drops genuinely-polymorphic jsonencode_fields (re-added as
# jsonencode string attributes in the hand-written CRUD step).
provider:
  name: mixpanel

resources:
  custom_event:
    schema:
      ignores:
        - custom_event.alternatives.valid_segfilter
    create:
      path: /api/app/custom_events/{project_id}
      method: POST
    read:
      path: /api/app/custom_events/{project_id}/{customevent_id}
      method: GET
    update:
      path: /api/app/custom_events/{project_id}/{customevent_id}
      method: PUT
    delete:
      path: /api/app/custom_events/{project_id}/{customevent_id}
