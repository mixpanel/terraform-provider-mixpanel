    read:
      path: /organizations/{organization_id}/org-request-access-settings
      method: GET
    update:
      path: /organizations/{organization_id}/org-request-access-settings/update
      method: POST
  spark_settings:
    create:
      path: /organizations/{organization_id}/update-spark-settings
      method: POST
    read:
      path: /organizations/{organization_id}/spark-settings
      method: GET
    update:
      path: /organizations/{organization_id}/update-spark-settings
