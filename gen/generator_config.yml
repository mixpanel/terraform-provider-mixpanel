  # P2 read-from-list entities: no instance GET. The read path is the COLLECTION
  # GET, whose 2xx response the preprocessor repoints to the single-item schema
  # (WebhookItem / DataGroup) so the framework builds a single-object read schema.
  # The instance-path {webhook_id}/{data_group_id} param is surfaced via the
  # update/delete paths. The hand-written CRUD Read selects the matching element.
  webhook:
    create:
      path: /api/app/projects/{project_id}/webhooks
      method: POST
    read:
      path: /api/app/projects/{project_id}/webhooks
      method: GET
    update:
      path: /api/app/projects/{project_id}/webhooks/{webhook_id}
      method: PATCH
    delete:
      path: /api/app/projects/{project_id}/webhooks/{webhook_id}
      method: DELETE
  data_group:
    create:
      path: /api/app/projects/{project_id}/data-groups
      method: POST
    read:
      path: /api/app/projects/{project_id}/data-groups
      method: GET
    update:
      path: /api/app/projects/{project_id}/data-groups/{data_group_id}
      method: POST
    delete:
      path: /api/app/projects/{project_id}/data-groups/{data_group_id}
      method: DELETE
  event_definition:
    create:
      path: /api/app/projects/{project_id}/event-definitions
      method: POST
    read:
      path: /api/app/projects/{project_id}/event-definitions/{event_definition_id}
      method: GET
    update:
      path: /api/app/projects/{project_id}/event-definitions/{event_definition_id}
      method: PATCH
    delete:
      path: /api/app/projects/{project_id}/event-definitions/{event_definition_id}
      method: DELETE
  workspace:
    schema:
      ignores:
        - data_filters
    create:
      path: /api/app/projects/{project_id}/workspaces
      method: POST
    read:
      path: /api/app/projects/{project_id}/workspaces/{workspace_id}
      method: GET
    update:
      path: /api/app/projects/{project_id}/workspaces/{workspace_id}
      method: PATCH
    delete:
      path: /api/app/projects/{project_id}/workspaces/{workspace_id}
      method: DELETE
  # dataset is a client-id UPSERT: create AND update both POST to the INSTANCE
  # path (dataset_id is client-supplied). The collection GET has no POST. The
  # hand-written CRUD (crudgen OVERRIDES create_to_instance=True) routes create
  # through the instance path; this config points create at the instance POST so
  # tfplugingen merges the DatasetUpsertRequest body into the resource schema.
  dataset:
    create:
      path: /api/app/projects/{project_id}/datasets/{dataset_id}
      method: POST
    read:
      path: /api/app/projects/{project_id}/datasets/{dataset_id}
      method: GET
    update:
      path: /api/app/projects/{project_id}/datasets/{dataset_id}
      method: POST
    delete:
      path: /api/app/projects/{project_id}/datasets/{dataset_id}
      method: DELETE
  # event_drop_filter: collection-path body-id CRUD. All verbs hit the COLLECTION
  # path; the id is carried in the JSON body. read is the collection GET, whose
  # 2xx response the preprocessor repoints to the single EventDropFilterResult item
  # schema (read_from_list). update/delete point at the same collection path so the
  # framework merges the EventDropFilterRequest body; the hand-written CRUD injects
  # the id into the body at runtime. `filters` is a free-form list -> jsonencode.
  event_drop_filter:
    schema:
      ignores:
        - filters
    create:
      path: /api/app/projects/{project_id}/data-definitions/events/drop-filters
      method: POST
    read:
      path: /api/app/projects/{project_id}/data-definitions/events/drop-filters
      method: GET
    update:
      path: /api/app/projects/{project_id}/data-definitions/events/drop-filters
      method: PATCH
    delete:
      path: /api/app/projects/{project_id}/data-definitions/events/drop-filters
      method: DELETE
  # data_governance_settings: project SINGLETON. create=update=POST and read=GET
  # all share the instance path; there is no collection-with-server-id and no id
  # path segment (synthetic id = project_id). The GET 2xx response is repointed to
  # the request schema in preprocess so read schema == create schema. The single
  # `dataStandards` nested object is treated as a jsonencode passthrough.
  data_governance_settings:
    schema:
      ignores:
        - dataStandards
    create:
      path: /api/app/projects/{project_id}/data-governance/data-standards/settings
      method: POST
    read:
      path: /api/app/projects/{project_id}/data-governance/data-standards/settings
      method: GET
    update:
      path: /api/app/projects/{project_id}/data-governance/data-standards/settings
      method: POST
  # project: ORG-scoped RPC lifecycle. There is no typed REST CRUD. preprocess
  # synthesizes a ProjectLifecycleModel schema and attaches it as the create POST
  # requestBody; the list GET 2xx response is repointed to the same schema
  # (read_from_list). create=POST create-projects (body {projectNames:[name]} at
  # runtime), read=GET projects (enveloped array, select by id). No update (name is
  # ForceNew); delete=POST delete-projects (body {projectIds:[id]}) handled by the
  # hand-written rpc_lifecycle CRUD, so no delete block here.
  project:
    create:
      path: /organizations/{organization_id}/create-projects/
      method: POST
    read:
      path: /organizations/{organization_id}/projects/
      method: GET
  # behavior: net-new CRUD. The create body is polymorphic and ALL responses are
  # the untyped BaseOkResponseModel[dict] envelope, so preprocess repoints the
  # POST/GET/PATCH 2xx responses to the request schema BehaviorCreateRequest
  # (read_repoint_schema). definition (open BehaviorDefinition) and behaviors
  # (list[BehaviorCreateItem]) are polymorphic -> ignored and re-added as
  # jsonencode string passthroughs in the CRUD step. read_after_create extracts
  # the server id from the untyped create response and GETs the instance.
  behavior:
    schema:
      ignores:
        - definition
        - behaviors
    create:
      path: /api/app/projects/{project_id}/behaviors
      method: POST
    read:
      path: /api/app/projects/{project_id}/behaviors/{behavior_id}
      method: GET
    update:
      path: /api/app/projects/{project_id}/behaviors/{behavior_id}
      method: PATCH
    delete:
      path: /api/app/projects/{project_id}/behaviors/{behavior_id}
      method: DELETE
  # ---- settings singletons -------------------------------------------------
  # Each settings singleton READ=GET base-path (response repointed to the synthetic
  # {settings:string} MxpSettingsPassthrough in preprocess); WRITE=POST a DISTINCT
  # /update sub-path that takes NO request body. The single `settings` field is
  # ignored here and re-injected as a jsonencode passthrough in the CRUD step. The
  # scope attribute (organization_id / project_id) comes from the path parameter.
  twofactor_settings:
    create:
      path: /organizations/{organization_id}/twofactor/update
      method: POST
    read:
      path: /organizations/{organization_id}/twofactor
      method: GET
    update:
      path: /organizations/{organization_id}/twofactor/update
      method: POST
  org_session_settings:
    create:
      path: /organizations/{organization_id}/org-session-settings/update
      method: POST
    read:
      path: /organizations/{organization_id}/org-session-settings
      method: GET
    update:
      path: /organizations/{organization_id}/org-session-settings/update
      method: POST
  org_request_access_settings:
    create:
      path: /organizations/{organization_id}/org-request-access-settings/update
